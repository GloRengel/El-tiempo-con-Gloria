<!--noticias.html-->
<main>
    <h2>Noticias de interés de España</h2>
    <div>
        <div id="contenido-noticias"></div>
    </div>

    <div class="card" style="width: 18rem;">
        <img src="..." class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title">Card title</h5>
          <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card’s content.</p>
          <a href="#" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>

</main>

<script>

    const API_KEY = '1f3d70f7eef146a082baa2313fb452bf'; // Mi API de GNews
    const Url = `https://gnews.io/api/v4/top-headlines?lang=es&max=5&token=${API_KEY}`;

    //Función para llamar noticias al main
    async function cargarNoticias() {
        try {
            const respuesta = await fetch(Url);
            const datos = await respuesta.json();

            console.log(datos);

            const contenedor = document.getElementById('contenido-noticias');
            contenedor.innerHTML = '';

            datos.articles.forEach(noticia => {
            const div = document.createElement('div');
            div.className = 'noticia';
            div.innerHTML = `
                <h3>${noticia.title}</h3>
                <p>${noticia.description || ''}</p>
                <a href="${noticia.url}" target="_blank">Leer más</a>
                <hr>
            `;
          contenedor.appendChild(div);
        });

        } catch (error) {
            console.error('Error al cargar noticias:', error);
            document.getElementById('contenido-noticias').innerHTML = '<p>Error al cargar noticias.</p>';
        }
    }

    window.addEventListener('load', cargarNoticias);

    

</script>
